name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: rust_cc_proxy
            ext: tar.gz

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: rust_cc_proxy.exe
            ext: zip

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: rust_cc_proxy
            ext: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build proxy binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build headroom-ffi DLL
        run: cargo build -p headroom-ffi --release --target ${{ matrix.target }}

      - name: Strip (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.binary }}
          strip target/${{ matrix.target }}/release/libheadroom_ffi.so 2>/dev/null || true
          strip target/${{ matrix.target }}/release/libheadroom_ffi.dylib 2>/dev/null || true

      - name: Package
        shell: bash
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} release/
          cp README.md README.zh-CN.md release/ 2>/dev/null || true

          # Copy DLL with expected name
          if [ -f target/${{ matrix.target }}/release/headroom_ffi.dll ]; then
            cp target/${{ matrix.target }}/release/headroom_ffi.dll release/headroom_core.dll
          elif [ -f target/${{ matrix.target }}/release/libheadroom_ffi.so ]; then
            cp target/${{ matrix.target }}/release/libheadroom_ffi.so release/headroom_core.so
          elif [ -f target/${{ matrix.target }}/release/libheadroom_ffi.dylib ]; then
            cp target/${{ matrix.target }}/release/libheadroom_ffi.dylib release/headroom_core.dylib
          fi

          ARCHIVE="rust_cc_proxy-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.ext }}"
          if [ "${{ matrix.ext }}" = "zip" ]; then
            7z a "./$ARCHIVE" *
          else
            tar -czf "./$ARCHIVE" *
          fi
          echo "archive=$ARCHIVE" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: rust_cc_proxy-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.ext }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## rust_cc_proxy ${{ github.ref_name }}

            Modular Claude Code proxy server with DeepSeek support and token compression.

            ### Included
            - `rust_cc_proxy[.exe]` — proxy binary
            - `headroom_core.[dll|so|dylib]` — optional Headroom compression DLL
            - `README.md` / `README.zh-CN.md`

            ### Quick Start
            ```bash
            DEEPSEEK_API_KEY=sk-... ./rust_cc_proxy
            ```
            Place `headroom_core.dll` next to the binary for advanced compression.
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
